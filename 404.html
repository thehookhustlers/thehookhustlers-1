<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Page Not Found — The Hook Hustlers</title>
 <meta name="description" content="The page you are looking for could not be found."/>
 <meta name="robots" content="noindex, follow"/>
 <link rel="icon" type="image/png" href="favicon.png"/>
 <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
 <style>
  :root {
   --black: #050505; --deep: #0a0a0a; --vivid: #7c3aed; --vivid2: #a855f7;
   --cyan: #06b6d4; --emerald: #10d99d; --crimson: #f43f5e;
   --muted: #a1a1aa; --white: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
   background-color: var(--black);
   color: var(--white);
   font-family: 'Rajdhani', sans-serif;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   height: 100vh;
   text-align: center;
   overflow: hidden;
  }
  .bg-mesh {
   position: absolute; inset: 0; z-index: 0; pointer-events: none;
   background: radial-gradient(circle at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 50%),
               radial-gradient(circle at 100% 100%, rgba(6,182,212,0.1) 0%, transparent 50%);
  }
  .container { position: relative; z-index: 1; padding: 20px; }
  h1 {
   font-family: 'Bebas Neue', sans-serif;
   font-size: 8rem;
   letter-spacing: 0.05em;
   background: linear-gradient(135deg, var(--vivid), var(--cyan));
   -webkit-background-clip: text;
   -webkit-text-fill-color: transparent;
   line-height: 1;
   margin-bottom: 20px;
  }
  h2 { font-size: 2rem; margin-bottom: 16px; font-weight: 600; }
  p { color: var(--muted); font-size: 1.1rem; max-width: 400px; margin: 0 auto 32px; line-height: 1.6; }
  .btn {
   display: inline-flex; align-items: center; justify-content: center;
   background: linear-gradient(135deg, var(--vivid), var(--vivid2));
   color: var(--white);
   text-decoration: none;
   padding: 14px 32px;
   border-radius: 8px;
   font-weight: 700;
   font-size: 1.1rem;
   letter-spacing: 0.06em;
   text-transform: uppercase;
   transition: all 0.3s ease;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(124,58,237,0.4); }
 
/* ── UNIVERSAL TOUCH DEVICE FIX: Hide custom cursor on mobile/tablets to prevent sticking ── */
@media (hover: none) and (pointer: coarse), (max-width: 1024px) {
  #cursor, #cursorRing, .cursor, .cursor-ring, #hh-cursor, #hh-ring, .hh-trail {
    display: none !important; opacity: 0 !important; visibility: hidden !important;
  }
  body, html, * { cursor: auto !important; }
}
</style>

</head>
<body>
 <div class="bg-mesh"></div>
 <div class="container">
  <h1>404</h1>
  <h2>Lost in the Ecosystem</h2>
  <p>The startup or investor profile you're looking for doesn't exist or has been moved.</p>
  <a href="home.html" class="btn">Return to Home</a>
 </div>

<!-- PREMIUM MOBILE TOUCH RIPPLE -->
<style>
@media (pointer: coarse) {
  .hh-touch-ripple {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    transform: translate(-50%, -50%) scale(0);
    animation: hhTouchRippleAnim 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    mix-blend-mode: screen;
  }
  @keyframes hhTouchRippleAnim {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
    50%  { opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
  }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Only activate on touch devices
  if (window.matchMedia("(pointer: coarse)").matches) {
    const splashColors = [
      'rgba(124,58,237,0.7)', // Vivid Violet
      'rgba(6,182,212,0.7)',  // Cyan
      'rgba(16,217,157,0.7)', // Emerald
      'rgba(244,63,94,0.7)'   // Crimson
    ];
    
    document.addEventListener('touchstart', function(e) {
      if (!e.touches || e.touches.length === 0) return;
      const touch = e.touches[0];
      
      const ripple = document.createElement('div');
      ripple.className = 'hh-touch-ripple';
      ripple.style.left = touch.clientX + 'px';
      ripple.style.top = touch.clientY + 'px';
      
      // Randomize core size and color per tap
      const size = 30 + Math.random() * 30;
      ripple.style.width = size + 'px';
      ripple.style.height = size + 'px';
      
      const color = splashColors[Math.floor(Math.random() * splashColors.length)];
      ripple.style.background = `radial-gradient(circle, ${color} 0%, transparent 80%)`;
      ripple.style.boxShadow = `0 0 30px ${color}`;
      
      document.body.appendChild(ripple);
      
      // Cleanup DOM after animation finishes
      setTimeout(() => ripple.remove(), 700);
    }, {passive: true});
  }
});
</script>
</body>

</html>
