<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Page Not Found — The Hook Hustlers</title>
 <meta name="description" content="The page you are looking for could not be found."/>
 <meta name="robots" content="noindex, follow"/>
 <link rel="icon" type="image/png" href="favicon.png"/>
 <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
 <style>
  :root {
   --black: #050505; --deep: #0a0a0a; --vivid: #7c3aed; --vivid2: #a855f7;
   --cyan: #06b6d4; --emerald: #10d99d; --crimson: #f43f5e;
   --muted: #a1a1aa; --white: #ffffff;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
   background-color: var(--black);
   color: var(--white);
   font-family: 'Rajdhani', sans-serif;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   height: 100vh;
   text-align: center;
   overflow: hidden;
  }
  .bg-mesh {
   position: absolute; inset: 0; z-index: 0; pointer-events: none;
   background: radial-gradient(circle at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 50%),
               radial-gradient(circle at 100% 100%, rgba(6,182,212,0.1) 0%, transparent 50%);
  }
  .container { position: relative; z-index: 1; padding: 20px; }
  h1 {
   font-family: 'Bebas Neue', sans-serif;
   font-size: 8rem;
   letter-spacing: 0.05em;
   background: linear-gradient(135deg, var(--vivid), var(--cyan));
   -webkit-background-clip: text;
   -webkit-text-fill-color: transparent;
   line-height: 1;
   margin-bottom: 20px;
  }
  h2 { font-size: 2rem; margin-bottom: 16px; font-weight: 600; }
  p { color: var(--muted); font-size: 1.1rem; max-width: 400px; margin: 0 auto 32px; line-height: 1.6; }
  .btn {
   display: inline-flex; align-items: center; justify-content: center;
   background: linear-gradient(135deg, var(--vivid), var(--vivid2));
   color: var(--white);
   text-decoration: none;
   padding: 14px 32px;
   border-radius: 8px;
   font-weight: 700;
   font-size: 1.1rem;
   letter-spacing: 0.06em;
   text-transform: uppercase;
   transition: all 0.3s ease;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(124,58,237,0.4); }
 
/* ── UNIVERSAL TOUCH DEVICE FIX: Hide custom cursor on mobile/tablets to prevent sticking ── */
@media (hover: none) and (pointer: coarse), (max-width: 1024px) {
  #cursor, #cursorRing, .cursor, .cursor-ring, #hh-cursor, #hh-ring, .hh-trail {
    display: none !important; opacity: 0 !important; visibility: hidden !important;
  }
  body, html, * { cursor: auto !important; }
}
</style>

</head>
<body>
 <div class="bg-mesh"></div>
 <div class="container">
  <h1>404</h1>
  <h2>Lost in the Ecosystem</h2>
  <p>The startup or investor profile you're looking for doesn't exist or has been moved.</p>
  <a href="home.html" class="btn">Return to Home</a>
 </div>


<!-- PREMIUM MOBILE STARBURST EFFECT -->
<style>
@media (pointer: coarse) {
  .hh-spark {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    mix-blend-mode: screen;
    will-change: transform, opacity;
  }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (window.matchMedia("(pointer: coarse)").matches) {
    const splashColors = [
      '#7c3aed', // Vivid Violet
      '#a855f7', // Violet Light
      '#06b6d4', // Cyan
      '#10d99d', // Emerald
      '#f43f5e'  // Crimson
    ];
    
    let sparks = [];
    
    function createSpark(x, y) {
      const el = document.createElement('div');
      el.className = 'hh-spark';
      
      const size = 3 + Math.random() * 6; // 3px to 9px
      const color = splashColors[Math.floor(Math.random() * splashColors.length)];
      
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.background = color;
      el.style.boxShadow = `0 0 ${size*2}px ${color}`;
      
      // Starting position
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      
      document.body.appendChild(el);
      
      // Physics properties
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      
      sparks.push({
        el: el,
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2, // Slight upward bias initially
        life: 1.0,
        decay: 0.02 + Math.random() * 0.03
      });
    }
    
    function animateSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        let p = sparks[i];
        
        p.life -= p.decay;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2; // Gravity
        
        if (p.life <= 0) {
          if(p.el.parentNode) p.el.parentNode.removeChild(p.el);
          sparks.splice(i, 1);
        } else {
          p.el.style.transform = `translate(-50%, -50%) translate(${p.x - parseFloat(p.el.style.left)}px, ${p.y - parseFloat(p.el.style.top)}px) scale(${p.life})`;
          p.el.style.opacity = p.life;
        }
      }
      requestAnimationFrame(animateSparks);
    }
    requestAnimationFrame(animateSparks);
    
    // Spawn on tap
    document.addEventListener('touchstart', function(e) {
      if (!e.touches || e.touches.length === 0) return;
      for(let t=0; t<e.touches.length; t++) {
        const touch = e.touches[t];
        // Spawn 12 sparks per tap
        for(let i=0; i<12; i++) {
          createSpark(touch.clientX, touch.clientY);
        }
      }
    }, {passive: true});
    
    // Spawn on drag
    let lastMove = 0;
    document.addEventListener('touchmove', function(e) {
      const now = Date.now();
      if (now - lastMove < 30) return; // limit spawn rate
      lastMove = now;
      
      if (!e.touches || e.touches.length === 0) return;
      const touch = e.touches[0];
      // Spawn 2 sparks per move trail
      createSpark(touch.clientX, touch.clientY);
      createSpark(touch.clientX, touch.clientY);
    }, {passive: true});
  }
});
</script>
</body>


</html>
