<!-- PREMIUM MOBILE TOUCH RIPPLE -->
<style>
@media (pointer: coarse) {
  .hh-touch-ripple {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    transform: translate(-50%, -50%) scale(0);
    animation: hhTouchRippleAnim 0.7s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    mix-blend-mode: screen;
  }
  @keyframes hhTouchRippleAnim {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
    50%  { opacity: 0.6; }
    100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
  }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Only activate on touch devices
  if (window.matchMedia("(pointer: coarse)").matches) {
    const splashColors = [
      'rgba(124,58,237,0.7)', // Vivid Violet
      'rgba(6,182,212,0.7)',  // Cyan
      'rgba(16,217,157,0.7)', // Emerald
      'rgba(244,63,94,0.7)'   // Crimson
    ];
    
    document.addEventListener('touchstart', function(e) {
      if (!e.touches || e.touches.length === 0) return;
      const touch = e.touches[0];
      
      const ripple = document.createElement('div');
      ripple.className = 'hh-touch-ripple';
      ripple.style.left = touch.clientX + 'px';
      ripple.style.top = touch.clientY + 'px';
      
      // Randomize core size and color per tap
      const size = 30 + Math.random() * 30;
      ripple.style.width = size + 'px';
      ripple.style.height = size + 'px';
      
      const color = splashColors[Math.floor(Math.random() * splashColors.length)];
      ripple.style.background = `radial-gradient(circle, ${color} 0%, transparent 80%)`;
      ripple.style.boxShadow = `0 0 30px ${color}`;
      
      document.body.appendChild(ripple);
      
      // Cleanup DOM after animation finishes
      setTimeout(() => ripple.remove(), 700);
    }, {passive: true});
  }
});
</script>
