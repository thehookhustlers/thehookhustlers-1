<!-- PREMIUM MOBILE STARBURST EFFECT -->
<style>
@media (pointer: coarse) {
  .hh-spark {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    mix-blend-mode: screen;
    will-change: transform, opacity;
  }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (window.matchMedia("(pointer: coarse)").matches) {
    const splashColors = [
      '#7c3aed', // Vivid Violet
      '#a855f7', // Violet Light
      '#06b6d4', // Cyan
      '#10d99d', // Emerald
      '#f43f5e'  // Crimson
    ];
    
    let sparks = [];
    
    function createSpark(x, y) {
      const el = document.createElement('div');
      el.className = 'hh-spark';
      
      const size = 3 + Math.random() * 6; // 3px to 9px
      const color = splashColors[Math.floor(Math.random() * splashColors.length)];
      
      el.style.width = size + 'px';
      el.style.height = size + 'px';
      el.style.background = color;
      el.style.boxShadow = `0 0 ${size*2}px ${color}`;
      
      // Starting position
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      
      document.body.appendChild(el);
      
      // Physics properties
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 6;
      
      sparks.push({
        el: el,
        x: x,
        y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2, // Slight upward bias initially
        life: 1.0,
        decay: 0.02 + Math.random() * 0.03
      });
    }
    
    function animateSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        let p = sparks[i];
        
        p.life -= p.decay;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.2; // Gravity
        
        if (p.life <= 0) {
          if(p.el.parentNode) p.el.parentNode.removeChild(p.el);
          sparks.splice(i, 1);
        } else {
          p.el.style.transform = `translate(-50%, -50%) translate(${p.x - parseFloat(p.el.style.left)}px, ${p.y - parseFloat(p.el.style.top)}px) scale(${p.life})`;
          p.el.style.opacity = p.life;
        }
      }
      requestAnimationFrame(animateSparks);
    }
    requestAnimationFrame(animateSparks);
    
    // Spawn on tap
    document.addEventListener('touchstart', function(e) {
      if (!e.touches || e.touches.length === 0) return;
      for(let t=0; t<e.touches.length; t++) {
        const touch = e.touches[t];
        // Spawn 12 sparks per tap
        for(let i=0; i<12; i++) {
          createSpark(touch.clientX, touch.clientY);
        }
      }
    }, {passive: true});
    
    // Spawn on drag
    let lastMove = 0;
    document.addEventListener('touchmove', function(e) {
      const now = Date.now();
      if (now - lastMove < 30) return; // limit spawn rate
      lastMove = now;
      
      if (!e.touches || e.touches.length === 0) return;
      const touch = e.touches[0];
      // Spawn 2 sparks per move trail
      createSpark(touch.clientX, touch.clientY);
      createSpark(touch.clientX, touch.clientY);
    }, {passive: true});
  }
});

// Session Observer Sync
document.addEventListener('DOMContentLoaded', async () => {
    if(typeof window.supabaseClient === 'undefined') return;
    const { data: { session } } = await window.supabaseClient.auth.getSession();
    if(session) {
      localStorage.setItem('hhLoggedIn', 'true');
    }
});
</script>
