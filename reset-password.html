<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — The Hook Hustlers</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>

  <style>
    :root {
      --bg: #04040b; --card: #0c0c1e;
      --vivid: #7c3aed; --cyan: #06b6d4; --emerald: #10d99d; --crimson: #f43f5e;
      --text: #f0edf8; --muted: rgba(240,237,248,0.5);
      --border: rgba(124,58,237,0.2);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; margin-bottom: 10px; color: var(--vivid); letter-spacing: 0.05em; }
    p { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
    input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Rajdhani', sans-serif; outline: none; margin-bottom: 20px; box-sizing: border-box; }
    input:focus { border-color: var(--vivid); }
    button { width: 100%; background: linear-gradient(135deg, var(--vivid), var(--cyan)); color: #fff; border: none; padding: 14px; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.3s; }
    button:hover { filter: brightness(1.2); box-shadow: 0 0 20px rgba(124,58,237,0.4); }
  </style>
</head>
<body>

  <div class="box">
    <h1>Create New Password</h1>
    <p id="statusText">Please enter your new secure password below to regain access to your account.</p>
    
    <input type="password" id="newPass" placeholder="Enter new password (min 8 chars)"/>
    <button id="updateBtn" onclick="updatePassword()">Update Password →</button>
  </div>

  <script>
    // Supabase redirects here with an access token in the URL hash
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.location.hash.includes('access_token')) {
        document.getElementById('statusText').innerHTML = '<span style="color:var(--crimson);">Error: Invalid or expired reset link. Please request a new one from the login page.</span>';
        document.getElementById('newPass').style.display = 'none';
        document.getElementById('updateBtn').style.display = 'none';
      }
    });

    async function updatePassword() {
      const pass = document.getElementById('newPass').value;
      if (pass.length < 8) return alert("Password must be at least 8 characters.");
      
      const btn = document.getElementById('updateBtn');
      btn.innerText = "Processing...";
      
      // Supabase automatically uses the session established by the URL hash
      const { error } = await supabaseClient.auth.updateUser({ password: pass });
      
      if (error) {
        alert("Error updating password: " + error.message);
        btn.innerText = "Update Password →";
      } else {
        btn.style.background = "var(--emerald)";
        btn.innerText = "Success! Redirecting...";
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      }
    }
  </script>
</body>
</html>
