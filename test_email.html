<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test EmailJS</title>
  <style>
    body { background: #04040b; color: #fff; font-family: Arial, sans-serif; text-align: center; padding: 50px; }
    button { background: #7c3aed; color: #fff; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #a855f7; }
    #status { margin-top: 20px; font-size: 18px; }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script type="text/javascript">
      // Your Public Key
      emailjs.init({ publicKey: "eKyFJq1Wc-iNOuZpM" });
  </script>
</head>
<body>

  <h1>EmailJS Diagnostics Test</h1>
  <p>Click the button below to instantly send a test matchmaking email to yourself.</p>
  
  <!-- Put your own email address inside the input to test! -->
  <input type="email" id="myEmail" placeholder="Enter your email address to receive test" style="padding:10px; width:300px; margin-bottom:20px; border-radius:4px; border:1px solid #333;" value="thehookhustlers@gmail.com">
  <br>

  <button onclick="runTest()">Send Test Match Request</button>
  <div id="status"></div>

  <script>
    async function runTest() {
      const statusDiv = document.getElementById('status');
      const testEmail = document.getElementById('myEmail').value;
      
      if(!testEmail) {
        statusDiv.innerHTML = "❌ Please enter an email address!";
        return;
      }

      statusDiv.innerHTML = "⏳ Sending test email (check your Developer Console)...";
      
      try {
        await emailjs.send(
          "service_vb6tp67", 
          "template_bl3wlq9", 
          {
            to_name: "Test Founder",
            to_email: testEmail,
            from_name: "Premium Investor",
            name: "Premium Investor", // Required for default templates
            email: "admin@thehookhustlers.com", // Required for default templates (Reply-To)
            message: "TEST SUCCESSFUL! 🚀 Your EmailJS system is perfectly linked to The Hook Hustlers frontend."
          }
        );
        statusDiv.innerHTML = "✅ SUCCESS! Check your inbox (and spam folder).";
      } catch (err) {
        console.error("EMAILJS ERROR:", err);
        statusDiv.innerHTML = `❌ FAILED: ${err.text || err.message || JSON.stringify(err)}<br>Right-click -> Inspect -> Console for details.`;
      }
    }
  </script>

</body>
</html>
